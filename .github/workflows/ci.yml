name: ci
on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaksは履歴も見る

      - name: gitleaks (シークレット混入ブロック §8-4)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: schema validation
        run: node scripts/validate.mjs

      - name: build
        run: npx astro build
